<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TutorHub | Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="center-body">

<div class="home-container">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <!-- Title -->
    <h1 class="title">TutorHub</h1>

    <!-- Tagline -->
    <p class="tagline">
        Find the Right Tutor Near You
    </p>

    <!-- Card -->
    <div class="login-card">

        <h2 style="margin-bottom:10px;">Welcome</h2>
        <p style="color:gray; margin-bottom:20px;">
            Your hub for Home & Online Tutors
        </p>

        <div class="btn-group">

            <a href="{{ url_for('student_register') }}">
                <button class="btn">Student Register</button>
            </a>

            <a href="{{ url_for('tutor_register') }}">
                <button class="btn tutor-btn">Tutor Register</button>
            </a>

            <a href="{{ url_for('login') }}">
                <button class="btn login-btn">Login</button>
            </a>

        </div>

    </div>

</div>

</body>
</html>
