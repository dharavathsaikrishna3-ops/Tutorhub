
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | TutorHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>🎓 TutorHub – Student Dashboard</h2>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="cards">

        <!-- FIND TUTORS -->
        <div class="card">
            <h3>🔍 Find Tutors</h3>
            <p>Search online tutors by subject and mode.</p>
            <a href="{{ url_for('find_tutors') }}">
                <button>Find Tutors</button>
            </a>
        </div>

        <!-- MY BOOKINGS -->
        <div class="card">
            <h3>📚 My Bookings</h3>
            <p>View your tutor booking requests.</p>
            <a href="{{ url_for('my_bookings') }}">
                <button>View Bookings</button>
            </a>
        </div>

        <!-- POST REQUIREMENT -->
        <div class="card">
            <h3>📝 Post Requirement</h3>
            <p>Post your tuition needs.</p>
            <a href="{{ url_for('post_requirement') }}">
                <button>Post Requirement</button>
            </a>
        </div>

        <!-- PROFILE (Future) -->
        <div class="card">
            <h3>👤 My Profile</h3>
            <p>View or edit your profile.</p>
            <button disabled>Coming Soon</button>
        </div>

    </div>

</div>

</body>
</html>
