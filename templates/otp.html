<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verify | TutorHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="center-body">
<div class="home-container">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <!-- Title -->
    <h1 class="title">TutorHub</h1>

    <!-- Tagline -->
    <p class="tagline">Find the Right Tutor Near You</p>

    <!-- OTP Card -->
    <div class="login-card">
        <h2>Verify OTP</h2>

        <p class="otp-text">
            OTP sent to <b>{{ session.get('mobile', '') }}</b>
        </p>

        <!-- ✅ Show error if wrong OTP -->
        {% if error %}
            <p style="color:red; font-size:14px; margin-bottom:10px;">
                {{ error }}
            </p>
        {% endif %}

        <!-- ✅ Show success message -->
        {% if success %}
            <p style="color:green; font-size:14px; margin-bottom:10px;">
                {{ success }}
            </p>
        {% endif %}

        <form method="POST">
            <input
                type="text"
                name="otp"
                placeholder="Enter 6 Digit OTP"
                maxlength="6"
                minlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="one-time-code"
                required>

            <button type="submit" class="btn-login">
                Verify OTP ✅
            </button>
        </form>

        <!-- ✅ Resend OTP -->
        <div class="resend">
            Didn't receive OTP?
            <a href="/resend-otp">Resend OTP</a>
        </div>

    </div>
</div>
</body>
</html>
